[package]
name = "sidra-transport"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
sidra-domain = { path = "../domain" }
sidra-kernel = { path = "../../services/kernel" }
sidra-security = { path = "../../services/security" }
sidra-seats = { path = "../../services/seats" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ulid = "1.0"
thiserror = "1.0"

[dev-dependencies]
tokio = { version = "1.0", features = ["full"] }
