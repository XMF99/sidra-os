name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-audit:
    name: Quality & Security Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt --check

      - name: Clippy Lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo Deny Audit
        uses: EmbarkStudios/cargo-deny-action@v1
        with:
          arguments: --config infrastructure/ci/cargo-deny.toml

      - name: Verify Dependency Direction
        run: node infrastructure/scripts/check-dependency-direction.js

      - name: Verify Bindings Synchronization
        run: node infrastructure/scripts/check-bindings-drift.js

  matrix-test:
    name: Cross-Platform Test Matrix (${{ matrix.os }})
    needs: lint-and-audit
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - uses: swatinem/rust-cache@v2

      - name: Cargo Workspace Tests
        run: cargo test --workspace

      - name: pnpm Workspace Tests
        run: pnpm --recursive run test
